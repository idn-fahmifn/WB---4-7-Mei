<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Semantic</title>
    <link rel="stylesheet" href="style.css" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Semantic membuat element semakin jelas tugas -->

    <!-- 
    
    Semantic HTML Isinya : 
    1. <header> = digunakan untuk area atas (judul web atau nama web). salah satu kelompok dari navbar. => didefinisikan hanya SEKALi
        2. <nav> = digunakan untuk navigation (ex. home, beranda, dll). => didefinisikan hanya SEKALi
            3. <main> = digunakan untuk body utama pada sebuah halaman. => didefinisikan hanya SEKALi
                4. <section> = digunakan untuk topik tertentu. => didefinsikan boleh lebih dari 1
                    5. <article> = optional khusus untuk konten yang panjang.
                        6. <aside> = konten tambahan (ex. berita, iklan dll)
                           7. <footer> = kaki untuk copyright, footer. didefinisikan hanya SEKALi
    -->

    <header class="area-header">
      <!-- memberikan logo bisa pake image atau header -->
      <div class="logo">
        <img
          src="https://www.idn.id/wp-content/uploads/2023/01/LOGO-ID-Networkers-IDN.ID-Merah-1024x320.png"
          alt="Logo"
        />
      </div>
      <nav>
        <ul class="navigation">
          <li class="nav-item"><a href="">Home</a></li>
          <li class="nav-item"><a href="">Service</a></li>
          <li class="nav-item"><a href="">Product</a></li>
          <li class="nav-item"><a href="">Gallery</a></li>
        </ul>
      </nav>

      <a href="" class="btn-call">Call Us</a>
    </header>
    <main class="main-content">
      <div class="column">
        <section id="hero" class="hero">
          <div class="col">
            <!-- area title -->
            <h1>Let's learning about Digital</h1>
            <p style="margin-top: 20px">
              Upgrade your skill, Upgrade your life.
            </p>
            <a href="" class="btn-explore">Explore Now</a>
          </div>
          <div class="col">
            <div class="image-banner" style="height: 100%">
              <img
                class="img-banner"
                src="https://png.pngtree.com/png-clipart/20250508/original/pngtree-real-life-photo-of-a-male-teacher-in-a-suit-png-image_20946108.png"
                width="240"
                alt="Gambar Baner"
              />
            </div>
          </div>
        </section>
        <section id="product" class="section-product">
          <!-- masukan berupa card -->

          <div class="container">
            <h1 style="text-align: center">Our Product</h1>
            <div class="d-grid">
              <div class="card-product">
                <img
                  src="https://view.subpage.app/app/company/C532b8873cc5442e2b1f2265b77a7d7dc/domain/MTiT0jFlGh/page/M6K4TirmGh/glossary/M36e5669dfd4b52477c65571a1479acd81676987587657/file/Mb4de6e716cf9eb420a1f39b7a0b320481707989448555.jpeg"
                  alt="gambar-produk"
                  class="img-product"
                />
                <h2 style="font-size: 1.2rem; margin-top: 24px; text-align: center;">UI/UX Fundamental</h2>
                <a href="" class="btn-enroll">Enroll Class</a>

              </div>
              <div class="card-product">
                <img
                  src="https://view.subpage.app/app/company/C532b8873cc5442e2b1f2265b77a7d7dc/domain/MTiT0jFlGh/page/M6K4TirmGh/glossary/M36e5669dfd4b52477c65571a1479acd81676987587657/file/Mb4de6e716cf9eb420a1f39b7a0b320481707989448555.jpeg"
                  alt="gambar-produk"
                  class="img-product"
                />
              </div>
              <div class="card-product">
                <img
                  src="https://view.subpage.app/app/company/C532b8873cc5442e2b1f2265b77a7d7dc/domain/MTiT0jFlGh/page/M6K4TirmGh/glossary/M36e5669dfd4b52477c65571a1479acd81676987587657/file/Mb4de6e716cf9eb420a1f39b7a0b320481707989448555.jpeg"
                  alt="gambar-produk"
                  class="img-product"
                />
              </div>
              <div class="card-product">
                <img
                  src="https://view.subpage.app/app/company/C532b8873cc5442e2b1f2265b77a7d7dc/domain/MTiT0jFlGh/page/M6K4TirmGh/glossary/M36e5669dfd4b52477c65571a1479acd81676987587657/file/Mb4de6e716cf9eb420a1f39b7a0b320481707989448555.jpeg"
                  alt="gambar-produk"
                  class="img-product"
                />
              </div>
            </div>
          </div>
        </section>
        <section id="myservice">
          <!-- jelaskan tentang service ada apa aja -->
        </section>
        <section id="gallery">
          <!-- tampilkan gambar -->
        </section>
        <section id="article">
          <article>
            <!-- article yang panjang pake lorem -->
          </article>
        </section>
      </div>

      <aside class="sidebar">
        <!-- berita -->
        <!-- iklan -->
      </aside>
    </main>
    <footer>
      <!-- isinya bisa copyright dan medsos -->
    </footer>
  </body>
</html>
