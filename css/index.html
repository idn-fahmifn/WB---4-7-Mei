<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- memanggil css dengan external css -->
    <link rel="stylesheet" href="style.css">

    <!-- internal css -->
    <style>
        
      .text-blue {
        color: #0088cc;
      }
      .text-title {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      }
      .text-content {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }
      .bg-blue{
        background-color: #0088cc;
        color: #ffffff;
      }
      .text-large{
        font-size: 1.5rem;
      }
      
      .fw-bold{
        font-weight: 600;
      }

      .text-right{
        text-align: right;
      }

      .container{
        width: 100dvw;
        height: 60dvh;
        background-color: #0088cc;
      }
      .child{
        background-color: aliceblue;
        width: 60%;
        height: 30%;
      }
      
    </style>
  </head>
  <body>

    <div class="container">
        <div class="child">
            <p>Ini adalah child</p>
        </div>
    </div>

    <h1 class="text-red text-title">Ini adalah elemen</h1>
    <p class="font-google fw-bold text-right">
      <span class="text-blue">Lorem ipsum dolor sit amet,</span> consectetur
      adipisicing elit. Similique iste minima, nesciunt numquam hic vel nihil a
      reprehenderit exercitationem quisquam!
    </p>
    <p class="bg-blue font-google text-large">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Provident, accusamus. Google
    </p>

    

  </body>
</html>
